service: semi-app
image: ghcr.io/nantang-dao/semi-app

servers:
  web:
    hosts: [sg.sola.day]
    primary: true

registry:
  server: ghcr.io
  username: nantang-dao
  password: KAMAL_REGISTRY_PASSWORD

proxy:
  hosts: [semi.im, www.semi.im, app.ntdao.xyz, semi.ntdao.xyz]
  app_port: 3000
  ssl: true
  health_check_path: /
  deploy_timeout: 60
  drain_timeout: 30

ssh:
  user: root

builder:
  arch: amd64
  remote: ssh://ubuntu@wamo.city

secrets:
  load: [.env.production]
  inject:
    - KAMAL_REGISTRY_PASSWORD
    - INSTANT_APP_ID
    - INSTANT_APP_ADMIN_TOKEN
    - OAUTH_VALID_CLIENT_IDS
    - OP_SOLA_BADGE_ADMIN_WALLET_PRIVATE_KEY
    - SEPOLIA_SOLA_BADGE_ADMIN_WALLET_PRIVATE_KEY
    - SOLA_BADGE_ADMIN_WALLET_PRIVATE_KEY
    - NUXT_PUBLIC_API_URL
    # VITE_* vars are read at RUNTIME by the Nitro server (import.meta.env -> process.env on
    # the server side), not only baked into the client bundle at build time. Without these the
    # server-side on-chain calls (badge/profile creation, badge mint) build RPC_URL as
    # "undefined/undefined" and fail. (Worked on Vercel, which exposes all env at runtime.)
    - VITE_API_URL
    - VITE_INFURA_API_KEY
    - VITE_ALCHEMY_API_KEY
    - VITE_MAINNET_RPC_URL
    - VITE_OP_RPC_URL
    - VITE_SEPOLIA_RPC_URL
    - VITE_MAINNET_BUNDLER_URL
    - VITE_OP_BUNDLER_URL
    - VITE_SEPOLIA_BUNDLER_URL
    - VITE_OP_PAYMASTER
    - VITE_PIMLICO_API_KEY
    - VITE_SOLA_AUTH_TOKEN
    - VITE_TOKEN_OWNER

retain_containers: 3
