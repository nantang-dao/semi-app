service: semi-app
image: jiangplus/semi-app

servers:
  web:
    - sg.sola.day

ssh:
  user: root

proxy:
  ssl: true
  host: web.semi.im
  app_port: 3000

builder:
  remote: ssh://ubuntu@wamo.city
  arch: amd64
  args:
    VITE_API_URL: https://api.semi.im
  secrets:
    - VITE_INFURA_API_KEY
    - VITE_ALCHEMY_API_KEY
    - VITE_OP_BUNDLER_URL
    - VITE_MAINNET_BUNDLER_URL
    - VITE_OP_PAYMASTER
    - VITE_SEPOLIA_BUNDLER_URL
    - VITE_SOLA_AUTH_TOKEN
    - VITE_TOKEN_OWNER
    - VITE_MAINNET_RPC_URL
    - VITE_OP_RPC_URL
    - VITE_SEPOLIA_RPC_URL

registry:
  username: jiangplus
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - INSTANT_APP_ID
    - INSTANT_APP_ADMIN_TOKEN
    - SOLA_BADGE_ADMIN_WALLET_PRIVATE_KEY
    - OP_SOLA_BADGE_ADMIN_WALLET_PRIVATE_KEY
    - SEPOLIA_SOLA_BADGE_ADMIN_WALLET_PRIVATE_KEY
    - OAUTH_VALID_CLIENT_IDS
  clear:
    PORT: "3000"
    NODE_ENV: production
